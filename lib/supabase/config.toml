[functions.payment_intent_resolve]
enabled = true
# IMPORTANT (Web/CORS): When verify_jwt is true, Supabase can reject browser preflight
# (OPTIONS) or invalid/expired JWTs before our function runs, and that rejection
# may not include CORS headers. That surfaces in Flutter Web as
# `ClientException: Failed to fetch`.
#
# We therefore disable the platform JWT gate and instead validate the caller JWT
# inside the function via `supabase.auth.getUser()`.
verify_jwt = false
import_map = "./functions/payment_intent_resolve/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/payment_intent_resolve/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/payment_intent_resolve/*.html" ]

