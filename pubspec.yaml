name: caddymoney
description: "CaddyMoney is a secure, multi-role fintech platform built with Flutter and Supabase, empowering users to send and receive money, merchants to manage payments, and administrators to oversee all platform operations with robust financial controls."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  geolocator_web: ^4.0.0
  geolocator: 13.0.4
  latlong2: ^0.9.1
  flutter_map: ^8.0.0
  google_maps_flutter_web: 0.5.14+3
  google_maps_flutter: ^2.0.0
  zxing2: 0.2.4
  image: ^4.0.0
  google_mlkit_barcode_scanning: 0.14.2
  mobile_scanner: ^7.0.0
  url_launcher: ^6.0.0
  file_picker: '>=8.1.2'
  image_picker: '>=1.1.2'
  http: any
  file_selector: ^1.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  supabase_flutter: '>=1.10.0'
  intl: 0.20.2
  shared_preferences: ^2.0.0
  flutter_svg: ^2.0.0
  qr_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  windows: true
  macos: true
  linux: true
  web: true
  image_path: assets/icons/app_icon.png
  # Android adaptive icon (recommended for best quality on modern launchers)
  adaptive_icon_foreground: assets/icons/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true
